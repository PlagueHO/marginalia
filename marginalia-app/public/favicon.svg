<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <linearGradient id="pages" x1="14" y1="8" x2="14" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#e2d0fc"/>
    </linearGradient>
  </defs>
  <!-- Back cover -->
  <rect x="6" y="6" width="30" height="36" rx="3" fill="url(#cover)"/>
  <!-- Page block -->
  <rect x="10" y="8" width="26" height="32" rx="2" fill="url(#pages)"/>
  <!-- Page lines (marginalia feel) -->
  <line x1="14" y1="15" x2="32" y2="15" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="20" x2="30" y2="20" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="25" x2="32" y2="25" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="28" y2="30" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Front cover (slightly offset for depth) -->
  <rect x="12" y="4" width="30" height="36" rx="3" fill="url(#cover)"/>
  <!-- Front page -->
  <rect x="16" y="6" width="24" height="32" rx="2" fill="#faf5ff"/>
  <!-- Front page lines -->
  <line x1="20" y1="13" x2="36" y2="13" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="18" x2="34" y2="18" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="36" y2="23" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="28" x2="32" y2="28" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Margin annotation marks (the "marginalia") -->
  <circle cx="17.5" cy="13" r="1.2" fill="#863bff" opacity="0.7"/>
  <line x1="16.5" y1="22" x2="18.5" y2="24" stroke="#863bff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="18.5" y1="22" x2="16.5" y2="24" stroke="#863bff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Spine highlight -->
  <rect x="12" y="4" width="3" height="36" rx="1.5" fill="#7e14ff" opacity="0.3"/>
</svg>