<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">How It Works</text>

  <!-- Background zone -->
  <rect x="20" y="60" width="760" height="340" rx="16" fill="#dbe4ff" fill-opacity="0.25" stroke="#4a9eed" stroke-width="1"/>

  <!-- Step 1: Upload or Paste -->
  <rect x="40" y="100" width="150" height="120" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="115" y="155" text-anchor="middle" font-size="20" fill="#1e1e1e">Upload</text>
  <text x="115" y="180" text-anchor="middle" font-size="20" fill="#1e1e1e">or Paste</text>
  <text x="115" y="82" text-anchor="middle" font-size="24">📄</text>
  <text x="115" y="248" text-anchor="middle" font-size="14" fill="#555555">Drag a .docx or paste</text>
  <text x="115" y="266" text-anchor="middle" font-size="14" fill="#555555">text directly</text>
  <text x="115" y="310" text-anchor="middle" font-size="16" font-weight="600" fill="#4a9eed">Step 1</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="160" x2="240" y2="160" stroke="#4a9eed" stroke-width="3"/>
  <polygon points="240,153 255,160 240,167" fill="#4a9eed"/>

  <!-- Step 2: Guide & Analyze -->
  <rect x="255" y="100" width="150" height="120" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="330" y="155" text-anchor="middle" font-size="20" fill="#1e1e1e">Guide &amp;</text>
  <text x="330" y="180" text-anchor="middle" font-size="20" fill="#1e1e1e">Analyze</text>
  <text x="330" y="82" text-anchor="middle" font-size="24">🤖</text>
  <text x="330" y="248" text-anchor="middle" font-size="14" fill="#555555">Pick a tone, add</text>
  <text x="330" y="266" text-anchor="middle" font-size="14" fill="#555555">custom instructions</text>
  <text x="330" y="310" text-anchor="middle" font-size="16" font-weight="600" fill="#8b5cf6">Step 2</text>

  <!-- Arrow 2→3 -->
  <line x1="405" y1="160" x2="455" y2="160" stroke="#8b5cf6" stroke-width="3"/>
  <polygon points="455,153 470,160 455,167" fill="#8b5cf6"/>

  <!-- Step 3: Review & Refine -->
  <rect x="470" y="100" width="150" height="120" rx="12" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="545" y="155" text-anchor="middle" font-size="20" fill="#1e1e1e">Review &amp;</text>
  <text x="545" y="180" text-anchor="middle" font-size="20" fill="#1e1e1e">Refine</text>
  <text x="545" y="82" text-anchor="middle" font-size="24">✏️</text>
  <text x="545" y="248" text-anchor="middle" font-size="14" fill="#555555">Accept, reject, or</text>
  <text x="545" y="266" text-anchor="middle" font-size="14" fill="#555555">modify suggestions</text>
  <text x="545" y="310" text-anchor="middle" font-size="16" font-weight="600" fill="#f59e0b">Step 3</text>

  <!-- Arrow 3→4 -->
  <line x1="620" y1="160" x2="670" y2="160" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="670,153 685,160 670,167" fill="#f59e0b"/>

  <!-- Step 4: Export .docx -->
  <rect x="685" y="100" width="150" height="120" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="155" text-anchor="middle" font-size="20" fill="#1e1e1e">Export</text>
  <text x="760" y="180" text-anchor="middle" font-size="20" fill="#1e1e1e">.docx</text>
  <text x="760" y="82" text-anchor="middle" font-size="24">📥</text>
  <text x="760" y="248" text-anchor="middle" font-size="14" fill="#555555">Download polished</text>
  <text x="760" y="266" text-anchor="middle" font-size="14" fill="#555555">manuscript</text>
  <text x="760" y="310" text-anchor="middle" font-size="16" font-weight="600" fill="#22c55e">Step 4</text>

  <!-- Re-analyze loop (dashed) -->
  <path d="M545,225 L545,370 L330,370 L330,225" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="323,232 330,218 337,232" fill="#ec4899"/>
  <text x="437" y="392" text-anchor="middle" font-size="14" fill="#ec4899" font-style="italic">Re-analyze &amp; iterate</text>
</svg>
